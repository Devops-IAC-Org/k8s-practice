apiVersion: apps/v1
kind: Deployment
metadata:
  name: plant-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: plant-app
  template:
    metadata:
      labels:
        app: plant-app
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
        resources:
          limits:
            memory: "128Mi"
            cpu: "100m"
          requests:
            memory: "64Mi"
            cpu: "60m"
